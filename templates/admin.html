<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/admin.css') }}">
</head>

<body>

<h1>📩 Contact Messages</h1>

<table>

    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Subject</th>
        <th>Message</th>
        <th>Date</th>
        <th>Action</th>
    </tr>

    {% for msg in messages %}

    <tr>

        <td>{{ msg.id }}</td>
        <td>{{ msg.name }}</td>
        <td>{{ msg.email }}</td>
        <td>{{ msg.subject }}</td>
        <td>{{ msg.message }}</td>
        <td>{{ msg.created_at }}</td>

        <td>
            <a href="{{ url_for('delete_message', id=msg.id) }}"
               class="delete-btn"
               onclick="return confirm('Are you sure you want to delete this message?')">
                Delete
            </a>
        </td>

    </tr>

    {% endfor %}

</table>

</body>
</html>
